<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
	<title>Cinderella Game</title>

	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet"
	      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap">
</head>

<body>
	<div id="gameCard">
		<h1 id="title">Welcome!</h1>

		<label id="label" for="textInput">Enter Your Name</label>
		<input id="textInput" type="text" placeholder="Enter text..." />
		<button id="sendBtn" disabled>Send</button>

		<p id="status">Connecting...</p>
		<button id="startBtn" class="hidden">Start Game</button>

		<div id="choiceContainer" class="hidden">
			<div id="choiceGrid"></div>
		</div>

		<div id="reactContainer" class="hidden">
			<div id="reactGrid">
				<button class="react-btn" data-react="comedy">😂</button>
				<button class="react-btn" data-react="triumphant">👑</button>
				<button class="react-btn" data-react="dark">💀</button>
				<button class="react-btn" data-react="tragedy">💔</button>
				<button class="react-btn" data-react="chaos">💥</button>
				<button class="react-btn" data-react="bittersweet">🥲</button>
			</div>
		</div>
	</div>

	<script type="module" src="main.js"></script>
</body>
</html>
